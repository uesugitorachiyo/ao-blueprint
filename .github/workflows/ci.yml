name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - run: go test ./...
      - run: go vet ./...
      - name: Production readiness
        if: runner.os != 'Windows'
        run: ./scripts/production-readiness.sh
      - name: Production readiness Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/production-readiness.ps1
